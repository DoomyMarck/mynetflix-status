<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyNetflixLocal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container { text-align: center; padding: 2rem; }
    .logo { font-size: 2.5rem; font-weight: 900; color: #e50914; letter-spacing: -1px; margin-bottom: 2rem; }
    .status { font-size: 1.1rem; color: #aaa; margin-bottom: 1.5rem; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #e50914;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 2rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .offline-icon { font-size: 3rem; margin-bottom: 1rem; }
    .message { font-size: 1.2rem; margin-bottom: 0.5rem; }
    .sub { font-size: 0.9rem; color: #666; }
    .updated { font-size: 0.75rem; color: #444; margin-top: 2rem; }
    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.7rem 1.8rem;
      background: #e50914;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: #f40612; }
  </style>
</head>
<body>
  <div class="container" id="app">
    <div class="logo">MyNetflixLocal</div>
    <div class="spinner"></div>
    <div class="status">Connessione in corso...</div>
  </div>

  <script>
    const JSON_URL = 'https://raw.githubusercontent.com/DoomyMarck/mynetflix-status/main/tunnel-url.json';

    async function checkStatus() {
      const app = document.getElementById('app');
      try {
        const res = await fetch(JSON_URL + '?t=' + Date.now());
        const data = await res.json();

        if (data.online && data.url) {
          app.innerHTML = `
            <div class="logo">MyNetflixLocal</div>
            <div class="status">Server online — reindirizzamento...</div>
            <div class="updated">Ultimo aggiornamento: ${data.updated || 'N/A'}</div>
          `;
          setTimeout(() => { window.location.href = data.url; }, 1200);
        } else {
          showOffline(data.updated);
        }
      } catch (e) {
        showOffline(null);
      }
    }

    function showOffline(updated) {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="logo">MyNetflixLocal</div>
        <div class="offline-icon">📴</div>
        <div class="message">Server offline</div>
        <div class="sub">Il server non è raggiungibile al momento.</div>
        <a class="btn" href="javascript:location.reload()">Riprova</a>
        ${updated ? `<div class="updated">Ultimo online: ${updated}</div>` : ''}
      `;
    }

    checkStatus();
  </script>
</body>
</html>
